services:
  mongodb:
    build: 
      context: .
      dockerfile: Dockerfile.db 
    container_name: mongodb_db
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - ./data/mongo:/data/db
    networks:
      - app-network

networks:
  app-network:
    name: shared-app-network 
    driver: bridge