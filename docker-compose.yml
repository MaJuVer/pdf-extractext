services:
  mongodb:
    image: mongo:8.2.9
    container_name: mongodb_proyecto-pdf-extractext
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mateo 
      MONGO_INITDB_ROOT_PASSWORD: pettxt25
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: visualizador_mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_URL: mongodb://mateo:password123@mongodb:27017/

volumes:
  mongo_data:
